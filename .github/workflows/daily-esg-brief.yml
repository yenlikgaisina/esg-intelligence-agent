name: Daily ESG Briefing

# Runs every morning and commits the new briefing (markdown + PDF) back to the repo.
on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily — adjust to your timezone
  workflow_dispatch:        # also runnable on-demand from the Actions tab

permissions:
  contents: write           # allows the workflow to commit the report back

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate today's briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python agent.py

      - name: Commit the new briefing
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ data/history.json
          git commit -m "ESG briefing $(date +%F)" || echo "No changes to commit"
          git push

      - name: Upload briefing as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: esg-briefing
          path: reports/
